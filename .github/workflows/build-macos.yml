name: Build macOS

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing release tag to attach the DMG to (leave empty to only upload a build artifact)"
        required: false
        default: "v0.1.0"
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    # macos-latest = Apple Silicon (aarch64). Covers M1/M2/M3/M4 Macs.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # Installed so the libmpv symlink target exists on the runner (for
      # codesign); end users must have `brew install mpv` too.
      - name: Install mpv
        run: brew install mpv

      - name: Install frontend dependencies
        run: npm ci

      # Downloads libmpv-wrapper.dylib into src-tauri/lib/ (gitignored).
      - name: Fetch libmpv wrapper
        run: npx tauri-plugin-libmpv-api setup-lib

      - name: Build app bundle
        run: npm run tauri build -- --bundles app

      # Basic (system-mpv) build. The app is NOT self-contained: it uses the
      # user's Homebrew-installed libmpv (and its MoltenVK) at runtime.
      # - the plugin looks for libmpv-wrapper.dylib in Contents/MacOS[/lib],
      #   NOT Contents/Resources where Tauri puts bundled resources;
      # - the wrapper dlopens "<its own dir>/libmpv.dylib", so we symlink that
      #   to the Homebrew libmpv. The runner has mpv installed too, so the link
      #   is not dangling when codesign seals the bundle.
      - name: Set up mpv wrapper (system libmpv)
        run: |
          set -euxo pipefail
          APP="src-tauri/target/release/bundle/macos/Vista TV.app"
          LIBDIR="$APP/Contents/MacOS/lib"
          mkdir -p "$LIBDIR"

          cp src-tauri/lib/libmpv-wrapper.dylib "$LIBDIR/"
          ln -sf /opt/homebrew/lib/libmpv.2.dylib "$LIBDIR/libmpv.dylib"

          # Drop the redundant resource copy of the wrapper.
          rm -rf "$APP/Contents/Resources/lib"

          # arm64 requires valid signatures; sign the wrapper, exe, then the app.
          codesign --force --sign - "$LIBDIR/libmpv-wrapper.dylib"
          codesign --force --sign - "$APP/Contents/MacOS/vista-iptv"
          codesign --force --sign - "$APP"
          codesign --verify --verbose=2 "$APP"

      - name: Create DMG
        run: |
          set -euxo pipefail
          VERSION="$(node -p "require('./src-tauri/tauri.conf.json').version")"
          STAGE="$(mktemp -d)"
          cp -R "src-tauri/target/release/bundle/macos/Vista TV.app" "$STAGE/"
          ln -s /Applications "$STAGE/Applications"
          hdiutil create -volname "Vista TV" -srcfolder "$STAGE" -ov -format UDZO \
            "Vista.TV_${VERSION}_aarch64.dmg"
          echo "DMG_NAME=Vista.TV_${VERSION}_aarch64.dmg" >> "$GITHUB_ENV"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: VistaTV-macos-aarch64
          path: ${{ env.DMG_NAME }}
          if-no-files-found: error

      - name: Attach DMG to release
        if: ${{ github.event_name == 'push' || inputs.release_tag != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.event_name == 'push' && github.ref_name || inputs.release_tag }}"
          gh release upload "$TAG" "$DMG_NAME" --clobber
